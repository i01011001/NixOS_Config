[csd]
preferred=server

[cursor]
beam-thickness=1
blink=yes
style=block

[main]
dpi-aware=no
font=Iosevka NF Medium:size=10
font-size-adjustment=0.100000
pad=8x8 center
resize-delay-ms=10

[mouse]
hide-when-typing=yes

[scrollback]
indicator-format=line
lines=20000
multiplier=2

[colors-dark]
foreground=c5c5c5
background=161616
regular0=161616 # black
regular1=c4746e # red
regular2=8a9a7b # green
regular3=c4b28a # yellow
regular4=8ba4b0 # blue
regular5=a292a3 # magenta
regular6=8ea4a2 # cyan
regular7=c5c5c5 # white
bright0=6d6d6d # bright black
bright1=c4746e # bright red
bright2=8a9a7b # bright green
bright3=c4b28a # bright yellow
bright4=8ba4b0 # bright blue
bright5=a292a3 # bright magenta
bright6=8ea4a2 # bright cyan
bright7=ffffff # bright white
